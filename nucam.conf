# nucam2linux configuration file
# Edit these values to match your preferences.

[camera]
# Which camera to use: "back" or "front"
camera_facing = back

# Resolution to request from the Android camera (WxH)
resolution = 1280x720

# Target framerate
fps = 30

[device]
# v4l2loopback device to write to.
# If "auto", the script will pick the first available loopback device.
v4l2_sink = auto

# ADB serial number of the device to use.
# If "auto", the first connected device is used.
# To find your device serial: run `adb devices`
adb_serial = auto

[scrcpy]
# Extra scrcpy flags (space-separated). Leave blank for defaults.
# Example: "--no-audio --max-fps 60"
extra_flags =

# Seconds to wait between reconnection attempts when the device is disconnected
reconnect_delay = 3
